
<div class="panel-wrapper relative">
    <div class="mobile-header flex justify-content-end  align-items-center px-10">
      <div class="mobile-header-actions flex w-100 justify-content-between ">
          <div class="flex align-items-center">
            <div class="welcome-badge-main">B U K F I T</div>
          </div>
          <div>
            <div class="mobile-menu-pay p-14" *ngIf="payment" (click)="moveToPayment()">
              <i class="icon-money fs-18 pointer"></i>
              <div class="mobile-menu-pay-circle">1</div>
            </div>

            <div class="mobile-profile-menu" (click)="$event.stopPropagation()">
              <button type="button" class="mobile-profile-menu-trigger p-8" (click)="toggleProfileMenu($event)" aria-label="Відкрити меню профілю">
                <i class="icon-menu fs-18 pointer"></i>
              </button>

              <div class="mobile-profile-menu-dropdown" *ngIf="isProfileMenuOpen">
                <button type="button" class="mobile-profile-menu-item" (click)="logOut()">
                  <i class="icon-sign-out fs-16"></i>
                  <span>Вийти з профілю</span>
                </button>
              </div>
            </div>
          </div>
      </div>

    </div>

    <div class="flex panel-body">
              <div class="menu-list-side-bar">
            <hs-menu-list></hs-menu-list>
        </div>

        <div class="panel-content flex-1 overflow-hidden">
            <div class="panel-content-scroll">
                <router-outlet></router-outlet>
            </div>
        </div>
    </div>
</div>
